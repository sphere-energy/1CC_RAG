name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Black (lint)
        run: black --check src tests

      - name: MyPy
        run: mypy src

      - name: Run tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite:///./ci-test.db
          COGNITO_USER_POOL_ID: eu-central-1_ci
        run: pytest -q

      - name: Dependency scan
        run: pip-audit --ignore-vuln CVE-2024-23342  # ecdsa 0.19.1 already includes the fix

  container-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t onecc-rag:ci .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: onecc-rag:ci
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: "1"
