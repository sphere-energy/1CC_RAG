version: '3.8'

services:
  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Gunicorn
      - PORT=${PORT:-8000}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}

      # Application metadata/runtime
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - APP_NAME=${APP_NAME:-1CC-RAG-API}
      - APP_VERSION=${APP_VERSION:-1.0.0-production}

      # Qdrant Configuration
      - QDRANT_HOST=${QDRANT_HOST:-localhost}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-1cc_legislation}

      # AWS Configuration
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - BEDROCK_EMBEDDING_MODEL_ID=${BEDROCK_EMBEDDING_MODEL_ID}
      - BEDROCK_TEXT_MODEL_ID=${BEDROCK_TEXT_MODEL_ID}

      # AWS Cognito
      - COGNITO_REGION=${COGNITO_REGION:-eu-central-1}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}

      # Database (AWS RDS)
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-20}
      - DATABASE_ECHO=${DATABASE_ECHO:-False}

      # Circuit Breaker
      - CIRCUIT_BREAKER_FAIL_MAX=${CIRCUIT_BREAKER_FAIL_MAX:-5}
      - CIRCUIT_BREAKER_TIMEOUT=${CIRCUIT_BREAKER_TIMEOUT:-60}

      # Application
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - RATE_LIMIT=${RATE_LIMIT:-5/minute}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOW_UNAUTHENTICATED_REQUESTS=${ALLOW_UNAUTHENTICATED_REQUESTS:-${ALLOW_MOCK_AUTH:-false}}
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  rag-network:
    driver: bridge
